<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1C3D0A" />
  <title>Offline — Bare Root</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #FDFDF8;
      color: #111109;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card { max-width: 360px; }
    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #1C3D0A;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-style: italic;
      font-weight: 800;
      font-size: 40px;
      line-height: 1;
      color: #A8D870;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      font-style: italic;
      color: #1C3D0A;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #6B6B5A;
      margin-bottom: 24px;
    }
    button {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #FDFDF8;
      background: #1C3D0A;
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      cursor: pointer;
    }
    button:hover { background: #2A5212; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">b</div>
    <h1>You&rsquo;re offline</h1>
    <p>Your garden will be here when you&rsquo;re back. Check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
